# Copy to config.toml and fill in. config.toml is gitignored.

[steam]
api_key = ""      # https://steamcommunity.com/dev/apikey
steam_id = ""     # your steamID64 (76561198...)

[igdb]
# Twitch developer app: https://dev.twitch.tv/console
client_id = ""
client_secret = ""

[sync]
platforms = ["PC (Microsoft Windows)"]  # IGDB platform names to keep release dates for

[notify]
# Failure pushes. Pick a long random topic name (it is the only auth on ntfy.sh)
# and subscribe to it in the ntfy iOS app. Leave empty to disable.
ntfy_url = ""
# Or (or additionally) a webhook, e.g. a Home Assistant webhook trigger:
# an automation with a webhook trigger receives {"title": ..., "message": ...}
# and can forward it to the companion-app notify service.
webhook_url = ""
