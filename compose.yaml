# Web UI runs continuously; the `job` service is invoked by cron via
# scripts/nightly.sh. Set BIND_IP to the Tailscale IP (`tailscale ip -4`)
# in .env or the environment so the site is not exposed on the LAN.
services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${BIND_IP:-127.0.0.1}:8787:8787"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data

  job:
    build: .
    profiles: ["job"]  # never started by `up`; only via `compose run`
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./data:/app/data
